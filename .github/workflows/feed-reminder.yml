name: feed-reminder

on:
  schedule:
    # 매일 오후 6시 KST = 09:00 UTC
    # 참고: GitHub 예약 실행은 보통 10~90분 늦게 도착할 수 있음
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      force_send:
        description: "테스트 발송 (오늘이 급여일이 아니어도 전체 개체 알림을 보냄)"
        type: boolean
        default: false

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send feeding reminder
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_SEND: ${{ inputs.force_send }}
        run: python reminder.py
